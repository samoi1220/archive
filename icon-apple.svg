    <rect x="0"   y="6"  width="22" height="92" fill="#6B4423"/>
    <rect x="3"   y="22" width="16" height="2"  fill="#FBF8F2" opacity="0.55"/>
    <rect x="3"   y="78" width="16" height="2"  fill="#FBF8F2" opacity="0.55"/>

    <rect x="26"  y="16" width="22" height="82" fill="#5A7A5A"/>
    <rect x="29"  y="36" width="16" height="2"  fill="#FBF8F2" opacity="0.55"/>

    <rect x="52"  y="0"  width="22" height="98" fill="#2C2825"/>
    <rect x="55"  y="20" width="16" height="2"  fill="#F5F1EA" opacity="0.5"/>
    <rect x="55"  y="74" width="16" height="2"  fill="#F5F1EA" opacity="0.5"/>

    <rect x="78"  y="22" width="22" height="76" fill="#A87B5C"/>
    <rect x="81"  y="40" width="16" height="2"  fill="#FBF8F2" opacity="0.55"/>

