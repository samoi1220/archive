    <stop offset="0%" stop-color="#FBF8F2"/>
    <stop offset="100%" stop-color="#F5F1EA"/>
  </radialGradient>
  <rect width="180" height="180" fill="url(#g)"/>

  <!-- 書本群（比例同 favicon，置中放大） -->
