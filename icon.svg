<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景：紙白 + 圓角 -->
  <rect width="64" height="64" rx="12" fill="#F5F1EA"/>

  <!-- Book 1 — 書布棕 -->
  <rect x="12" y="15" width="9" height="34" fill="#6B4423"/>
  <rect x="13.5" y="21" width="6" height="0.8" fill="#FBF8F2" opacity="0.55"/>
  <rect x="13.5" y="42" width="6" height="0.8" fill="#FBF8F2" opacity="0.55"/>

  <!-- Book 2 — 苔綠 -->
  <rect x="22" y="19" width="9" height="30" fill="#5A7A5A"/>
  <rect x="23.5" y="26" width="6" height="0.8" fill="#FBF8F2" opacity="0.55"/>

  <!-- Book 3 — 墨色（最高、視覺主角） -->
  <rect x="32" y="13" width="9" height="36" fill="#2C2825"/>
  <rect x="33.5" y="20" width="6" height="0.8" fill="#F5F1EA" opacity="0.5"/>
  <rect x="33.5" y="40" width="6" height="0.8" fill="#F5F1EA" opacity="0.5"/>

  <!-- Book 4 — 磚紅 -->
  <rect x="42" y="22" width="9" height="27" fill="#A87B5C"/>
  <rect x="43.5" y="28" width="6" height="0.8" fill="#FBF8F2" opacity="0.55"/>

  <!-- 書架實木層板 -->
  <rect x="8" y="49" width="48" height="3" fill="#2C2825"/>
</svg>
