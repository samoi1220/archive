<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>讀書室 ARCHIVE — 私人閱讀圖書館</title>

<!-- Favicon (modern browsers prefer SVG, fallback to PNG/ICO) -->
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="shortcut icon" href="favicon.ico">

<!-- iOS Add to Home Screen -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="167x167" href="apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="讀書室">

<!-- Android / PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F5F1EA">
<meta name="mobile-web-app-capable" content="yes">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --paper:        #F5F1EA;
  --paper-light:  #FBF8F2;
  --surface:      #FFFFFF;
  --ink:          #2C2825;
  --ink-soft:     #4A433D;
  --muted:        #8A8079;
  --border:       #E5DFD2;
  --border-soft:  #EFEAE0;
  --accent:       #6B4423;
  --accent-light: #8B6F47;
  --st-reading:   #B07A2A;
  --st-read:      #5A7A5A;
  --st-want:      #A87B5C;
  --shadow-card:  0 1px 2px rgba(44,40,37,.04), 0 4px 14px rgba(44,40,37,.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  letter-spacing: .02em;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  background:
    radial-gradient(circle at 18% 22%, rgba(139,111,71,.04), transparent 55%),
    radial-gradient(circle at 82% 78%, rgba(107,68,35,.03), transparent 55%),
    var(--paper);
}

/* App container — mobile first, max 480px */
.app {
  width: 100%;
  max-width: 480px;
  min-height: 100vh;
  background: var(--paper-light);
  position: relative;
  padding-bottom: 88px;
  box-shadow: 0 0 60px rgba(44,40,37,.06);
  overflow-x: hidden;
}

/* ───────────── Headers ───────────── */
.app-header {
  position: sticky; top: 0; z-index: 40;
  background: rgba(251,248,242,.92);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border-soft);
}
.header-row {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.header-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px; font-weight: 600; letter-spacing: .08em;
}
.header-sub {
  font-size: 10px; color: var(--muted);
  letter-spacing: .25em; text-transform: uppercase;
  font-family: 'IBM Plex Mono', monospace; margin-top: 3px;
}

.sub-header {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: rgba(251,248,242,.94);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
}
.sub-header-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px; font-weight: 600; letter-spacing: .05em;
  flex: 1; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s;
}
.icon-btn:hover { background: var(--paper); border-color: var(--accent-light); }
.icon-btn svg { width: 18px; height: 18px; }

/* ───────────── Content ───────────── */
.content { padding: 16px 20px 24px; }
.content-flush { padding: 0 0 24px; }

/* ───────────── Stats grid ───────────── */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  padding: 16px 18px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-card);
}
.stat-card.featured {
  grid-column: span 2;
  background: linear-gradient(135deg, #2C2825 0%, #3A332E 100%);
  color: var(--paper-light);
  border: none;
  padding: 20px;
}
.stat-card.featured::after{
  content:''; position:absolute; right:-30px; top:-30px;
  width:120px; height:120px; border-radius:50%;
  background: radial-gradient(circle, rgba(139,111,71,.18), transparent 70%);
}
.stat-label {
  font-size: 10px; color: var(--muted);
  letter-spacing: .25em; text-transform: uppercase;
  font-family: 'IBM Plex Mono', monospace;
  margin-bottom: 8px;
}
.stat-card.featured .stat-label { color: rgba(245,241,234,.55); }
.stat-value {
  font-family: 'Noto Serif TC', serif;
  font-size: 30px; font-weight: 600; line-height: 1;
}
.stat-card.featured .stat-value { font-size: 42px; }
.stat-suffix {
  font-size: 11px; color: var(--muted);
  margin-left: 6px;
  font-family: 'IBM Plex Mono', monospace;
}
.stat-card.featured .stat-suffix { color: rgba(245,241,234,.5); }
.stat-divider{
  height:1px; background: rgba(245,241,234,.12); margin:14px 0;
}
.stat-mini-row{
  display:flex; gap:18px; font-family:'IBM Plex Mono',monospace;
  font-size:11px; color: rgba(245,241,234,.6); letter-spacing:.1em;
}
.stat-mini-row b{ color: var(--paper-light); font-weight:500; margin-left:4px; }

/* ───────────── Section ───────────── */
.section { margin-bottom: 28px; }
.section-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 12px; padding: 0 2px;
}
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px; font-weight: 600; letter-spacing: .1em;
}
.section-action {
  font-size: 10px; color: var(--muted);
  letter-spacing: .2em;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
}
.section-action:hover { color: var(--accent); }

/* ───────────── Book card ───────────── */
.book-list { display: flex; flex-direction: column; gap: 10px; }

.book-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 14px;
  display: flex; gap: 14px;
  cursor: pointer;
  transition: all .15s;
  box-shadow: var(--shadow-card);
}
.book-card:hover { border-color: var(--accent-light); transform: translateY(-1px); }

.book-cover {
  width: 56px; flex-shrink: 0; aspect-ratio: 2/3;
  border-radius: 3px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  color: var(--paper-light);
  font-size: 10px; text-align: center; padding: 6px;
  line-height: 1.3; font-weight: 500;
  position: relative;
  box-shadow: 0 2px 6px rgba(44,40,37,.12), inset -2px 0 0 rgba(0,0,0,.12);
}
.book-cover::after {
  content: ''; position: absolute;
  left: 4px; top: 5%; bottom: 5%;
  width: 1px; background: rgba(255,255,255,.18);
  pointer-events: none;
}
.book-cover-title {
  position: relative;
  z-index: 1;
  pointer-events: none;
}
.book-cover-img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: inherit;
  z-index: 2;
}

.book-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.book-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px; font-weight: 500;
  line-height: 1.4;
  overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.book-meta {
  font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.book-meta-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 4px; }

/* Status badge */
.status-badge {
  font-size: 10px;
  padding: 2px 8px 2px 7px;
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .12em;
  display: inline-flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.status-badge::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
}
.st-reading { background: rgba(176,122,42,.1); color: var(--st-reading); }
.st-reading::before { background: var(--st-reading); }
.st-read    { background: rgba(90,122,90,.1); color: var(--st-read); }
.st-read::before    { background: var(--st-read); }
.st-want    { background: rgba(168,123,92,.1); color: var(--st-want); }
.st-want::before    { background: var(--st-want); }

/* Tag chip (small) */
.tag {
  font-size: 11px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--ink-soft);
  background: var(--paper);
  white-space: nowrap;
}

/* ───────────── Note card ───────────── */
.note-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .15s;
  box-shadow: var(--shadow-card);
}
.note-card:hover { border-color: var(--accent-light); }

.note-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; gap: 8px;
}
.note-type {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .15em;
  background: var(--paper);
  color: var(--ink-soft);
  border: 1px solid var(--border);
}
.note-type.t-excerpt  { background: rgba(107,68,35,.08); border-color: rgba(107,68,35,.2); color: var(--accent); }
.note-type.t-thought  { background: rgba(90,122,90,.08); border-color: rgba(90,122,90,.2); color: var(--st-read); }
.note-type.t-idea     { background: rgba(176,122,42,.08); border-color: rgba(176,122,42,.2); color: var(--st-reading); }
.note-type.t-pitch    { background: rgba(168,123,92,.08); border-color: rgba(168,123,92,.2); color: var(--st-want); }

.note-date {
  font-size: 11px; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}
.note-content {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px; color: var(--ink);
  line-height: 1.75;
  margin-bottom: 8px;
  white-space: pre-wrap;
}
.note-source {
  font-size: 11px; color: var(--muted);
  display: flex; gap: 8px; align-items: center;
}
.note-source::before {
  content: '—'; color: var(--border);
}

/* ───────────── Tab bar ───────────── */
.tab-bar {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: rgba(251,248,242,.94);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 8px 0 calc(10px + env(safe-area-inset-bottom));
  z-index: 100;
}
.tab {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 6px 0;
  border: none; background: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 10px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .15em;
  transition: color .15s;
}
.tab.active { color: var(--ink); }
.tab svg { width: 20px; height: 20px; }

/* ───────────── Search & filter ───────────── */
.search-row { display: flex; gap: 8px; margin-bottom: 14px; }
.search-bar {
  flex: 1;
  display: flex; align-items: center; gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
}
.search-bar input {
  flex: 1; border: none; outline: none; background: transparent;
  color: var(--ink); font-family: inherit; font-size: 13px;
}
.search-bar svg { color: var(--muted); flex-shrink: 0; width: 16px; height: 16px; }

.filter-row {
  display: flex; gap: 6px;
  margin-bottom: 16px;
  overflow-x: auto;
  padding-bottom: 4px;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: var(--surface);
  color: var(--ink-soft);
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.chip.active { background: var(--ink); color: var(--paper-light); border-color: var(--ink); }

.result-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--muted);
  letter-spacing: .15em;
  margin-bottom: 12px;
  padding: 0 2px;
}

/* ───────────── Detail page ───────────── */
.detail-hero {
  padding: 28px 20px 24px;
  background: linear-gradient(180deg, var(--paper) 0%, var(--paper-light) 100%);
  border-bottom: 1px solid var(--border-soft);
  text-align: center;
}
.detail-cover {
  width: 124px; aspect-ratio: 2/3;
  margin: 0 auto 18px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Noto Serif TC', serif;
  color: var(--paper-light);
  font-size: 14px; text-align: center; padding: 18px 14px;
  line-height: 1.5; font-weight: 500;
  box-shadow:
    inset -3px 0 0 rgba(0,0,0,.12),
    inset 0 0 0 1px rgba(255,255,255,.06),
    0 12px 28px rgba(44,40,37,.16);
  position: relative;
}
.detail-cover::after{
  content:''; position:absolute; left:5px; top:5%; bottom:5%; width:1px;
  background: rgba(255,255,255,.16);
}
.detail-index {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: .3em;
  margin-bottom: 8px;
}
.detail-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 22px; font-weight: 600;
  margin-bottom: 4px; line-height: 1.4;
}
.detail-author {
  font-size: 13px; color: var(--muted); margin-bottom: 14px;
}
.detail-status { display: flex; justify-content: center; }

.detail-block {
  padding: 20px;
  border-bottom: 1px solid var(--border-soft);
}
.detail-block:last-child { border-bottom: none; }
.detail-block-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .25em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 10px;
}
.detail-block-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border-soft);
}

.meta-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 16px 20px;
}
.meta-item .label {
  font-size: 10px; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .15em; text-transform: uppercase;
  margin-bottom: 3px;
}
.meta-item .value {
  font-size: 13px; color: var(--ink);
  font-family: 'Noto Serif TC', serif;
  word-break: break-all;
}
.meta-item.full { grid-column: span 2; }

.prose {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px; line-height: 1.85;
  color: var(--ink);
  white-space: pre-wrap;
}

.summary-quote {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px; line-height: 1.7;
  color: var(--ink);
  padding: 14px 0 14px 18px;
  border-left: 2px solid var(--accent);
  font-weight: 500;
}

.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }

/* ───────────── Form ───────────── */
.form-tabs {
  display: flex; gap: 4px;
  background: var(--paper);
  padding: 4px;
  border-radius: 10px;
  margin-bottom: 22px;
}
.form-tab {
  flex: 1; text-align: center;
  padding: 9px 4px;
  font-size: 11px; letter-spacing: .05em;
  border-radius: 7px;
  cursor: pointer;
  color: var(--muted);
  transition: all .15s;
  border: none; background: transparent;
  font-family: inherit;
}
.form-tab.active {
  background: var(--surface); color: var(--ink);
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}

.field { margin-bottom: 16px; }
.field-label {
  display: block;
  font-size: 10px; color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .2em; text-transform: uppercase;
  margin-bottom: 6px;
}
.field-input,
.field-textarea,
.field-select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  font-size: 14px;
  font-family: 'Noto Serif TC', serif;
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.field-input:focus,
.field-textarea:focus,
.field-select:focus {
  border-color: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(139,111,71,.08);
}
.field-textarea {
  min-height: 110px; resize: vertical; line-height: 1.7;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.field-hint {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  line-height: 1.6;
  font-family: inherit;
}
.suggest-row {
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center;
  margin-top: 8px;
}
.suggest-label {
  font-size: 11px;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .15em;
  margin-right: 2px;
}
.suggest-chip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 4px 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink-soft);
  border-radius: 4px;
  cursor: pointer;
  letter-spacing: .05em;
  transition: all .15s;
}
.suggest-chip:hover {
  background: var(--accent);
  color: var(--paper-light);
  border-color: var(--accent);
}
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

.status-pick {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.status-pick .chip { text-align: center; padding: 8px; border-radius: 8px; }

/* Buttons */
.btn-row {
  display: flex; gap: 10px;
  padding: 16px 20px 0;
}
.btn {
  padding: 12px 18px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  font-weight: 500;
  letter-spacing: .05em;
  transition: all .15s;
}
.btn:hover { background: var(--paper); }
.btn-primary {
  background: var(--ink); color: var(--paper-light);
  border-color: var(--ink); flex: 1;
}
.btn-primary:hover { background: var(--accent); border-color: var(--accent); }
.btn-ghost { color: var(--muted); }
.btn-danger { color: #B85C5C; }

/* Empty state */
.empty {
  text-align: center;
  padding: 56px 20px;
  color: var(--muted);
}
.empty-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 15px; margin-bottom: 6px; color: var(--ink-soft);
  letter-spacing: .05em;
}
.empty-sub { font-size: 12px; }

/* ───────────── Category grid ───────────── */
.cat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.cat-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  display: flex;
  align-items: stretch;
  overflow: hidden;
  cursor: pointer;
  transition: all .15s;
  box-shadow: var(--shadow-card);
  height: 76px;
}
.cat-card:hover { border-color: var(--accent-light); transform: translateY(-1px); }
.cat-spine {
  width: 8px; flex-shrink: 0;
  box-shadow: inset -1px 0 0 rgba(0,0,0,.12);
}
.cat-card-body {
  flex: 1; padding: 12px 14px;
  display: flex; flex-direction: column; justify-content: center;
  min-width: 0;
}
.cat-name {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px; font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}
.cat-count {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 13px; color: var(--ink-soft);
  letter-spacing: .05em;
}
.cat-count span { color: var(--muted); font-size: 10px; margin-left: 2px; }

/* ───────────── Recent strip ───────────── */
.recent-strip {
  display: flex; gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  margin: 0 -20px;
  padding: 4px 20px;
}
.recent-strip::-webkit-scrollbar { display: none; }
.recent-card {
  flex-shrink: 0;
  width: 92px;
  cursor: pointer;
}
.recent-card .book-cover {
  width: 92px;
  font-size: 11px;
  margin-bottom: 8px;
}
.recent-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 12px; line-height: 1.4;
  color: var(--ink);
  margin-bottom: 2px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.recent-author {
  font-size: 10px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* Animation */
.fade-in { animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }

/* Floating action button (for notes) */
.fab {
  position: fixed;
  right: calc(50% - 240px + 18px);
  bottom: calc(86px + env(safe-area-inset-bottom));
  width: 48px; height: 48px;
  background: var(--ink); color: var(--paper-light);
  border: none; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(44,40,37,.25);
  cursor: pointer;
  z-index: 90;
}
@media (max-width: 480px) { .fab { right: 18px; } }

.hidden { display: none !important; }

/* small helpers */
.row-between { display: flex; align-items: center; justify-content: space-between; }
.muted-mono {
  font-family: 'IBM Plex Mono', monospace;
  color: var(--muted); font-size: 11px; letter-spacing: .12em;
}

/* divider line w/ caption */
.label-divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .25em;
  color: var(--muted); text-transform: uppercase;
}
.label-divider::before, .label-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border-soft);
}

/* ───────────── Notes grouped by book ───────────── */
.notes-by-book { display: flex; flex-direction: column; gap: 16px; }

.note-group {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.note-group-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-soft);
  background: linear-gradient(180deg, var(--paper-light) 0%, var(--surface) 100%);
  transition: background .15s;
}
.note-group-head:hover { background: var(--paper); }

.note-group-cover {
  width: 36px;
  flex-shrink: 0;
}
.note-group-cover .book-cover {
  width: 36px;
  font-size: 7px;
  padding: 3px;
}

.note-group-info {
  flex: 1; min-width: 0;
}
.note-group-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .15em;
  color: var(--muted);
  margin-bottom: 2px;
}
.note-group-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px; font-weight: 500;
  color: var(--ink);
  line-height: 1.35;
  margin-bottom: 2px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.note-group-author {
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.note-group-count {
  flex-shrink: 0;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink);
  text-align: right;
  letter-spacing: .05em;
  padding: 0 2px;
}
.note-group-count span {
  font-size: 10px; color: var(--muted);
  margin-left: 2px;
  letter-spacing: .15em;
}

.note-group-chevron {
  width: 18px; height: 18px;
  flex-shrink: 0;
  color: var(--muted);
  display: inline-flex; align-items: center; justify-content: center;
  margin-left: 4px;
  transition: transform .2s ease;
}
.note-group-chevron svg { width: 14px; height: 14px; }
.note-group.is-expanded .note-group-chevron { transform: rotate(90deg); color: var(--ink); }
.note-group:not(.is-expanded) .note-group-head { border-bottom: none; }
.note-group:not(.is-expanded) .note-group-body { display: none; }

.note-group-list {
  padding: 4px 0;
}

.group-toggle-btn {
  background: none;
  border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: .15em;
  color: var(--accent);
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background .15s, color .15s;
}
.group-toggle-btn:hover { background: var(--paper); color: var(--ink); }

.note-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-soft);
}
.note-item:last-child { border-bottom: none; }

.note-item-head {
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.note-item-content {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  line-height: 1.75;
  color: var(--ink);
  white-space: pre-wrap;
}
.note-item-tags {
  margin-top: 8px;
  display: flex; gap: 6px; flex-wrap: wrap;
}

.note-group-foot {
  display: flex; gap: 4px;
  padding: 8px 8px;
  border-top: 1px solid var(--border-soft);
  background: var(--paper-light);
}
.note-group-action {
  flex: 1;
  background: none; border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: .12em;
  color: var(--muted);
  padding: 8px 6px;
  cursor: pointer;
  border-radius: 6px;
  transition: all .15s;
}
.note-group-action:hover { background: var(--surface); color: var(--accent); }

/* ───────────── Settings page ───────────── */
.settings-section { margin-bottom: 28px; }
.settings-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .25em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding: 0 4px;
}
.settings-card {
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  padding: 4px 16px;
  box-shadow: var(--shadow-card);
}
.settings-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border-soft);
}
.settings-row:last-child { border-bottom: none; }
.settings-row-label {
  font-size: 13px;
  color: var(--ink-soft);
  flex-shrink: 0;
  font-family: inherit;
}
.settings-row-value {
  font-size: 13px;
  color: var(--ink);
  text-align: right;
  font-family: 'Noto Serif TC', serif;
  word-break: break-all;
}
.settings-row-value.mono {
  font-family: 'IBM Plex Mono', monospace;
}
.settings-row-value.small { font-size: 11px; color: var(--muted); }
.settings-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 12px 0;
  border-top: 1px solid var(--border-soft);
}
.settings-actions:first-child { border-top: none; }
.settings-card .settings-row + .settings-actions { border-top: 1px solid var(--border-soft); }
.settings-actions .btn { font-size: 13px; padding: 10px 14px; }
.settings-divider {
  height: 1px; background: var(--border-soft); margin: 4px -16px;
}
.settings-hint {
  font-size: 11px; color: var(--muted);
  padding: 0 0 12px;
  line-height: 1.6;
}

/* ───────────── Auth screen ───────────── */
.auth-screen {
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 20% 30%, rgba(139,111,71,.06), transparent 55%),
    radial-gradient(circle at 80% 70%, rgba(107,68,35,.04), transparent 55%),
    var(--paper);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000;
  padding: 24px;
}
.auth-screen.hidden { display: none; }
.auth-card {
  width: 100%; max-width: 360px;
  background: var(--surface);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  padding: 36px 28px 28px;
  box-shadow: 0 20px 60px rgba(44,40,37,.10);
}
.auth-brand {
  font-family: 'Noto Serif TC', serif;
  font-size: 28px; font-weight: 600;
  letter-spacing: .2em;
  text-align: center;
}
.auth-brand-sub {
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .3em;
  color: var(--muted);
  margin: 4px 0 28px;
}
.auth-tagline {
  text-align: center;
  font-size: 13px; color: var(--ink-soft);
  margin-bottom: 24px;
  line-height: 1.6;
}
.auth-card form input {
  width: 100%;
  padding: 11px 13px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--paper-light);
  font-family: inherit; font-size: 14px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.auth-card form input:focus {
  border-color: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(139,111,71,.08);
}
.auth-error {
  color: #B85C5C;
  font-size: 12px;
  margin: 4px 0 8px;
  min-height: 18px;
  font-family: inherit;
}
.auth-btn {
  width: 100%;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--ink);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  margin-top: 6px;
  transition: all .15s;
  letter-spacing: .05em;
}
.auth-btn:hover { background: var(--paper); }
.auth-btn-primary {
  background: var(--ink); color: var(--paper-light);
  border-color: var(--ink);
  font-weight: 500;
}
.auth-btn-primary:hover { background: var(--accent); border-color: var(--accent); }
.auth-btn:disabled { opacity: .5; cursor: not-allowed; }
.auth-fallback {
  text-align: center;
  margin-top: 24px;
  padding-top: 18px;
  border-top: 1px solid var(--border-soft);
}
.auth-fallback a {
  font-size: 11px; color: var(--muted);
  text-decoration: underline;
  text-underline-offset: 3px;
  font-family: inherit;
}
.auth-fallback a:hover { color: var(--ink-soft); }

/* User block in sidebar (desktop) / dashboard header (mobile) */
.cloud-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .15em;
  color: var(--muted);
  display: inline-flex; align-items: center; gap: 5px;
  text-transform: uppercase;
}
.cloud-status::before {
  content: '';
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--st-read);
}
.cloud-status.is-offline::before { background: #C0A05A; }
.cloud-status.is-error::before { background: #B85C5C; }

/* ───────────── List / Grid view toggle ───────────── */
.view-toggle {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface);
}
.view-btn {
  background: none; border: none; cursor: pointer;
  padding: 8px 10px;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.view-btn svg { width: 16px; height: 16px; }
.view-btn:hover { color: var(--ink); }
.view-btn.is-active { background: var(--paper); color: var(--ink); }
.view-btn + .view-btn { border-left: 1px solid var(--border); }

/* Grid mode for book list — bookshelf style, auto-fill */
.book-list.is-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
  gap: 24px 14px;
}
.book-card-grid {
  flex-direction: column;
  align-items: stretch;
  padding: 0;
  background: none;
  border: none;
  box-shadow: none;
  text-align: left;
  gap: 8px;
}
.book-card-grid:hover {
  border: none;
  transform: none;
}
.book-card-grid:hover .book-cover-grid {
  transform: translateY(-3px);
  box-shadow: 0 10px 22px rgba(44,40,37,.18), inset -2px 0 0 rgba(0,0,0,.12);
}
.book-cover-grid {
  width: 100%;
  aspect-ratio: 2/3;
  transition: transform .2s ease, box-shadow .2s ease;
}
.book-grid-info {
  width: 100%;
  padding: 0 1px;
}
.book-card-grid .book-title {
  font-size: 12px;
  -webkit-line-clamp: 2;
  margin-bottom: 2px;
  line-height: 1.45;
}
.book-card-grid .book-meta {
  font-size: 10px;
  -webkit-line-clamp: 1;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ───────────── Status button picker (detail page) ───────────── */
.status-picker {
  margin-top: 16px;
}
.status-picker-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; letter-spacing: .25em;
  color: var(--muted);
  margin-bottom: 8px;
  text-transform: uppercase;
}
.status-picker-row {
  display: flex; gap: 6px; align-items: center;
  flex-wrap: wrap;
}
.status-btn {
  font-family: inherit;
  font-size: 12px;
  padding: 7px 14px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink-soft);
  cursor: pointer;
  transition: all .15s;
  display: inline-flex; align-items: center; gap: 5px;
  letter-spacing: .05em;
}
.status-btn::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: background .15s;
}
.status-btn:hover { border-color: var(--accent-light); }
.status-btn.is-active.st-want    { background: rgba(168,123,92,.12);  border-color: var(--st-want);    color: var(--st-want); }
.status-btn.is-active.st-want::before    { background: var(--st-want); }
.status-btn.is-active.st-reading { background: rgba(176,122,42,.12);  border-color: var(--st-reading); color: var(--st-reading); }
.status-btn.is-active.st-reading::before { background: var(--st-reading); }
.status-btn.is-active.st-read    { background: rgba(90,122,90,.12);   border-color: var(--st-read);    color: var(--st-read); }
.status-btn.is-active.st-read::before    { background: var(--st-read); }
.status-btn-clear {
  font-family: inherit;
  font-size: 14px; line-height: 1;
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  margin-left: 4px;
}
.status-btn-clear:hover { color: var(--ink); border-color: var(--ink-soft); }

/* ───────────── Detail v2 layout ───────────── */
.detail-layout {
  padding: 0;
}
.detail-side {
  padding: 24px 20px 20px;
  background: linear-gradient(180deg, var(--paper) 0%, var(--paper-light) 100%);
  border-bottom: 1px solid var(--border-soft);
}
.detail-side .detail-cover {
  margin: 0 auto 16px;
}
.detail-side-meta {
  margin-top: 18px;
  border-top: 1px dashed var(--border);
  padding-top: 16px;
}
.detail-side-meta .detail-block-title {
  margin-bottom: 12px;
}
.meta-edit-btn {
  margin-left: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  letter-spacing: .15em;
  background: none; border: none;
  color: var(--accent);
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
}
.meta-edit-btn:hover { background: var(--paper); }
.detail-block-title.with-action {
  display: flex; align-items: center;
}
.detail-block-title.with-action::after { display: none; }

.detail-tabs-wrap {
  padding: 16px 20px 24px;
}
.detail-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border-soft);
}
.detail-tab {
  flex: 1;
  text-align: center;
  padding: 12px 8px 14px;
  font-size: 13px;
  border: none; background: none;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  letter-spacing: .08em;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .15s;
}
.detail-tab.active {
  color: var(--ink);
  border-bottom-color: var(--accent);
}

.empty-tab {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.empty-tab-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  margin-bottom: 6px; color: var(--ink-soft);
}
.empty-tab-link {
  font-size: 12px;
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: .15em;
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
}

/* ───────────── Desktop layout (≥900px) ───────────── */
@media (min-width: 900px) {
  body {
    background:
      radial-gradient(circle at 18% 22%, rgba(139,111,71,.04), transparent 55%),
      radial-gradient(circle at 82% 78%, rgba(107,68,35,.03), transparent 55%),
      var(--paper);
    align-items: stretch;
  }
  .app {
    max-width: 1400px;
    min-height: 100vh;
    background: var(--paper-light);
    display: grid;
    grid-template-columns: 240px 1fr;
    grid-template-rows: 1fr;
    padding-bottom: 0;
    box-shadow: 0 0 80px rgba(44,40,37,.08);
    overflow: visible;
  }

  /* Sidebar nav (was bottom tab bar) */
  .tab-bar {
    position: sticky;
    top: 0;
    bottom: auto;
    left: auto;
    transform: none;
    width: auto;
    max-width: none;
    height: 100vh;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 28px 14px calc(28px + env(safe-area-inset-bottom));
    border-top: none;
    border-right: 1px solid var(--border);
    background: var(--paper-light);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    z-index: 50;
  }
  .tab-bar::before {
    content: '讀書室';
    font-family: 'Noto Serif TC', serif;
    font-size: 18px; font-weight: 600;
    letter-spacing: .25em;
    padding: 6px 14px;
    color: var(--ink);
  }
  .tab-bar::after {
    content: 'ARCHIVE · LIBRARY';
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: .25em;
    color: var(--muted);
    padding: 0 14px 18px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 18px;
  }
  .tab-bar.hidden { display: flex !important; } /* keep visible on desktop */

  .tab {
    flex-direction: row;
    justify-content: flex-start;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 8px;
    font-size: 12px;
    letter-spacing: .2em;
    transition: background .15s, color .15s;
  }
  .tab.active {
    background: var(--paper);
    color: var(--ink);
  }
  .tab:hover:not(.active) { background: rgba(0,0,0,.02); }
  .tab svg { width: 18px; height: 18px; }

  /* Main scroll area */
  main#main {
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header & content padding */
  .app-header { padding: 28px 36px 20px; position: relative; }
  .app-header.header-with-bg { background: var(--paper-light); }
  .sub-header { padding: 16px 36px; }
  .content { padding: 24px 36px 48px; }

  /* Wider book list (列表模式) */
  .book-list:not(.is-grid) {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  /* Bookshelf grid on desktop */
  .book-list.is-grid {
    grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    gap: 32px 18px;
  }

  /* Stats: 5 columns single row */
  .stats-grid {
    grid-template-columns: 2.2fr 1fr 1fr 1fr 1fr;
    gap: 12px;
  }
  .stat-card.featured { grid-column: span 1; }
  .stat-card.featured .stat-value { font-size: 36px; }

  /* Cat grid 4 cols */
  .cat-grid { grid-template-columns: repeat(4, 1fr); }

  /* Recent strip can show more */
  .recent-card { width: 110px; }
  .recent-card .book-cover { width: 110px; font-size: 12px; }

  /* Book detail: 2-column desktop layout */
  .detail-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
  }
  .detail-side {
    border-right: 1px solid var(--border-soft);
    border-bottom: none;
    padding: 28px 28px 32px;
    position: sticky;
    top: 0;
    align-self: start;
    max-height: 100vh;
    overflow-y: auto;
    text-align: left;
  }
  .detail-side .detail-cover { margin: 0 0 18px; }
  .detail-side .detail-title { text-align: left; }
  .detail-side .detail-author { text-align: left; }
  .detail-side .detail-status { justify-content: flex-start; }

  .detail-tabs-wrap {
    padding: 28px 36px 48px;
  }

  .detail-tab { flex: 0 1 auto; padding: 12px 24px 14px; min-width: 110px; }

  /* Form wider */
  .form-container {
    max-width: 720px;
  }

function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toISOString().slice(0,10);
}

function bookById(id) { return state.books.find(b => b.id === id); }

// 把每本書的「閱讀筆記／設計轉譯」欄位轉成虛擬筆記，
// 與 state.notes 合併呈現於 Notes 頁與書本詳情。
function getAllNotes() {
  const synthetic = [];
  const map = [
    { key: 'summary',         type: 'excerpt', label: '一句話總結' },
    { key: 'coreIdea',        type: 'idea',    label: '核心觀念' },
    { key: 'myThoughts',      type: 'thought', label: '我的心得' },
    { key: 'designLessons',   type: 'idea',    label: '設計啟發' },
    { key: 'appliedProjects', type: 'pitch',   label: '可應用專案' },
  ];
  for (const b of state.books) {
    for (const m of map) {
      const v = b[m.key];
      if (v && String(v).trim()) {
        synthetic.push({
          id: '_syn:' + b.id + ':' + m.key,
          bookId: b.id,
          type: m.type,
          _virtual: true,
          _virtualField: m.key,
          _label: m.label,
          content: String(v).trim(),
          tags: b.tags || [],
          date: b.addedAt || ''
        });
      }
    }
  }
  return [...state.notes, ...synthetic];
}

function uniq(arr) { return Array.from(new Set(arr.filter(Boolean))); }
function categoriesList() { return uniq(state.books.map(b => b.category)); }
function tagsList() { return uniq(state.books.flatMap(b => b.tags || [])); }

function coverGradient(b) {
  const seed = (b.title || '').split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  const palettes = [
    ['#6B4423', '#8B6F47'],
    ['#3A4F3F', '#5A7A5A'],
    ['#4A3B52', '#6B5A78'],
    ['#5B3A2E', '#A87B5C'],
    ['#2C3340', '#4A5468'],
    ['#5A4630', '#857250'],
    ['#3B4A52', '#5C7682'],
    ['#5C3D3D', '#86635E'],
  ];
  const p = palettes[seed % palettes.length];
  return `linear-gradient(135deg, ${p[0]} 0%, ${p[1]} 100%)`;
}

// Try to fetch real cover from OpenLibrary by ISBN; fall back to gradient + title text.
function coverImgUrl(b) {
  if (b.coverUrl) return b.coverUrl;
  const isbn = (b.isbn || '').replace(/[-\s]/g, '');
  if (isbn && /^\d{10,13}$/.test(isbn)) {
    return `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg?default=false`;
  }
  return '';
}

function coverHtml(b, extraClass = '', extraStyle = '') {
  const grad = coverGradient(b);
  const img = coverImgUrl(b);
  const cls = 'book-cover' + (extraClass ? ' ' + extraClass : '');
  return `<div class="${cls}" style="background:${grad};${extraStyle}">
    <span class="book-cover-title">${escapeHtml(b.title)}</span>
    ${img ? `<img class="book-cover-img" src="${img}" loading="lazy" decoding="async" onerror="this.style.display='none'">` : ''}
  </div>`;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ───────── ROUTING ───────── */
function navigate(hash) {
  if (window.location.hash !== hash) {
    window.location.hash = hash;
  } else {
    render();
  }
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', () => {
  if (!window.location.hash) window.location.hash = '#/';
  render();
});

function getRoute() {
  const h = window.location.hash || '#/';
  // 移除 query string (#/note-new?book=YH001 → note-new)
  const noQuery = h.split('?')[0];
  const m = noQuery.match(/^#\/(.*)$/);
  const path = m ? m[1] : '';
  const parts = path.split('/').filter(Boolean);
  // 解析 query
  const query = {};
  const qIdx = h.indexOf('?');
  if (qIdx >= 0) {
    h.slice(qIdx + 1).split('&').forEach(kv => {
      const [k, v] = kv.split('=');
      if (k) query[decodeURIComponent(k)] = v ? decodeURIComponent(v) : '';
    });
  }
  return { path, parts, query };
}

/* ───────── RENDER DISPATCH ───────── */
function render() {
  const { parts } = getRoute();
  const root = main();
  root.innerHTML = '';

  // Tab bar visibility (mobile only — desktop CSS forces it visible)
  const subPages = ['book','edit','edit-notes','new','note-new'];
  if (subPages.includes(parts[0])) {
    tabBar().classList.add('hidden');
  } else {
    tabBar().classList.remove('hidden');
  }
  renderTabBar();

  if (parts.length === 0) renderDashboard();
  else if (parts[0] === 'library') renderLibrary();
  else if (parts[0] === 'book' && parts[1]) renderDetail(parts[1]);
  else if (parts[0] === 'edit' && parts[1]) renderForm(parts[1], 'basic');
  else if (parts[0] === 'edit-notes' && parts[1]) renderForm(parts[1], 'content');
  else if (parts[0] === 'new') renderForm(null, 'basic');
  else if (parts[0] === 'notes') renderNotes();
  else if (parts[0] === 'note-new') renderNoteForm();
  else if (parts[0] === 'settings') renderSettings();
  else renderDashboard();

  window.scrollTo({ top: 0 });
}

    { id: 'settings', label: 'SETTINGS',icon: I.settings, href: '#/settings' },

  tabBar().innerHTML = tabs.map(t =>
    `<button class="tab ${cur === t.id ? 'active' : ''}" onclick="navigate('${t.href}')">${t.icon}<span>${t.label}</span></button>`

}

        <button class="chip ${!ui.filterCategory ? 'active' : ''}" onclick="setCategoryFilter('')">所有分類</button>
        ${categoriesList().map(c => `<button class="chip ${ui.filterCategory===c ? 'active' : ''}" onclick="setCategoryFilter('${escapeHtml(c)}')">${escapeHtml(c)}</button>`).join('')}
      </div>

      <div class="filter-row" id="tag-filters">
        <button class="chip ${!ui.filterTag ? 'active' : ''}" onclick="setTagFilter('')">所有標籤</button>
        ${tagsList().slice(0, 12).map(t => `<button class="chip ${ui.filterTag===t ? 'active' : ''}" onclick="setTagFilter('${escapeHtml(t)}')">#${escapeHtml(t)}</button>`).join('')}
      </div>

      <div class="result-count">${list.length} / ${state.books.length} BOOKS</div>

      ${list.length
        ? `<div class="book-list ${ui.libraryView==='grid'?'is-grid':''}">${list.map(b => renderBookCard(b, ui.libraryView==='grid')).join('')}</div>`
        : `<div class="empty"><div class="empty-title">沒有符合的書籍</div><div class="empty-sub">試試清除部分篩選條件</div></div>`}

    </div>
  `;

  const inp = document.getElementById('search-input');
  if (inp) {
    inp.addEventListener('input', e => {
      ui.search = e.target.value;
      // re-render only the list portion w/o losing focus
      const cnt = document.querySelector('.result-count');
      const bl  = document.querySelector('.book-list');
      const empty = document.querySelector('.empty');
      const newList = state.books.filter(b => {
        if (ui.filterStatus === '__unset__') {
          if (b.status) return false;
        } else if (ui.filterStatus && b.status !== ui.filterStatus) return false;
        if (ui.filterCategory && b.category !== ui.filterCategory) return false;
        if (ui.filterTag && !(b.tags || []).includes(ui.filterTag)) return false;
        if (ui.search) {
          const q = ui.search.toLowerCase();
          const hay = [b.id, b.title, b.author, b.publisher, b.isbn, b.translator, b.category, ...(b.tags||[])].filter(Boolean).join(' ').toLowerCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });
      if (cnt) cnt.textContent = `${newList.length} / ${state.books.length} BOOKS`;
      const target = bl || empty;
      const html = newList.length
        ? `<div class="book-list ${ui.libraryView==='grid'?'is-grid':''}">${newList.map(b => renderBookCard(b, ui.libraryView==='grid')).join('')}</div>`
        : `<div class="empty"><div class="empty-title">沒有符合的書籍</div><div class="empty-sub">試試清除部分篩選條件</div></div>`;
      if (target) target.outerHTML = html;
    });
  }
}

function renderDetailTab(b, tab) {
  const block = (title, content) => content && content.trim()
    ? `<div class="detail-block" style="padding:18px 0;border-bottom:1px solid var(--border-soft)">
         <div class="detail-block-title">${title}</div>
         <div class="prose">${escapeHtml(content)}</div>
       </div>` : '';

  const editLink = `<div class="empty-tab"><div class="empty-tab-title">這個區塊還沒有內容</div><div class="empty-tab-link" onclick="navigate('#/edit-notes/${b.id}')">＋ 點此編輯</div></div>`;

  if (tab === 'concept') {
    const parts = [];
    if (b.summary && b.summary.trim()) parts.push(`<div class="detail-block" style="padding:18px 0;border-bottom:1px solid var(--border-soft)">
      <div class="detail-block-title">一句話總結 / SUMMARY</div>
      <div class="summary-quote">${escapeHtml(b.summary)}</div></div>`);
    parts.push(block('核心觀念 / CORE IDEA', b.coreIdea));
    parts.push(block('我的心得 / THOUGHTS', b.myThoughts));
    const html = parts.filter(Boolean).join('');
    return html || editLink;
  }
  if (tab === 'design') {
    const notes = notesByBook(b.id);
    const parts = [
      block('設計啟發 / DESIGN LESSONS', b.designLessons),
      block('可應用專案 / PROJECTS', b.appliedProjects),
    ];
    let notesHtml = '';
    if (notes.length) {
      notesHtml = `<div class="detail-block" style="padding:18px 0">
        <div class="detail-block-title with-action">
          本書筆記 / NOTES (${notes.length})
          <button class="meta-edit-btn" onclick="navigate('#/note-new?book=${b.id}')">＋ 新增 →</button>
        </div>
        ${notes.map(renderNoteCard).join('')}
      </div>`;
    }
    parts.push(notesHtml);
    const html = parts.filter(Boolean).join('');
    return html || editLink;
  }
  if (tab === 'context') {
    const parts = [
      block('作者背景 / AUTHOR', b.authorBg),
      block('出版背景 / CONTEXT', b.publishBg),
    ];
    const html = parts.filter(Boolean).join('');
    return html || editLink;
  }
  return '';
}

function renderNotes() {
  const allNotes = getAllNotes();
  let list = allNotes.filter(n => {
    if (ui.noteType && n.type !== ui.noteType) return false;
    if (ui.noteCategory) {
      const bk = bookById(n.bookId);
      if (!bk || bk.category !== ui.noteCategory) return false;
    }
    if (ui.noteBook && n.bookId !== ui.noteBook) return false;
    if (ui.noteSearch) {
      const q = ui.noteSearch.toLowerCase();
      const b = bookById(n.bookId);
      const hay = [n.content, n._label, ...(n.tags || []), b?.title, b?.author, b?.id].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  // 以書為單位群組，按書本編號排序
  const groupMap = new Map();
  for (const n of list) {
    if (!groupMap.has(n.bookId)) groupMap.set(n.bookId, []);
    groupMap.get(n.bookId).push(n);
  }
  const groups = Array.from(groupMap.entries())
    .map(([bookId, notes]) => ({
      book: bookById(bookId),
      notes: notes.sort((a, b) => (b.date || '').localeCompare(a.date || ''))
    }))
    .filter(g => g.book)
    .sort((a, b) => (a.book.id || '').localeCompare(b.book.id || ''));

  const totalNotes = list.length;
  const totalBooks = groups.length;

  main().innerHTML = `
    <header class="app-header">
      <div class="header-row">
        <div>
          <div class="header-title">筆記</div>
          <div class="header-sub">NOTES · ${allNotes.length} ENTRIES</div>
        </div>
        <button class="icon-btn" onclick="navigate('#/note-new')" aria-label="新增筆記">${I.plus}</button>
      </div>
    </header>

    <div class="content fade-in">

      <div class="search-row">
        <div class="search-bar">
          ${I.search}
          <input id="note-search-input" type="text" placeholder="搜尋內容、書籍、標籤" value="${escapeHtml(ui.noteSearch)}">
        </div>
      </div>

      <div class="filter-row">
        <button class="chip ${!ui.noteType ? 'active' : ''}" onclick="setNoteType('')">全部</button>
        <button class="chip ${ui.noteType==='excerpt' ? 'active' : ''}" onclick="setNoteType('excerpt')">摘錄</button>
        <button class="chip ${ui.noteType==='thought' ? 'active' : ''}" onclick="setNoteType('thought')">心得</button>
        <button class="chip ${ui.noteType==='idea' ? 'active' : ''}" onclick="setNoteType('idea')">靈感</button>
        <button class="chip ${ui.noteType==='pitch' ? 'active' : ''}" onclick="setNoteType('pitch')">提案語句</button>
      </div>

      <div class="filter-row">
        <button class="chip ${!ui.noteCategory ? 'active' : ''}" onclick="setNoteCategory('')">所有分類</button>
        ${categoriesList().map(c => `<button class="chip ${ui.noteCategory===c ? 'active' : ''}" onclick="setNoteCategory('${escapeHtml(c)}')">${escapeHtml(c)}</button>`).join('')}
      </div>

      <div class="result-count" style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <span>${totalBooks} BOOKS · ${totalNotes} NOTES</span>
        ${groups.length ? `<button class="group-toggle-btn" id="groupToggleBtn" onclick="toggleAllNoteGroups()">全部展開</button>` : ''}
      </div>

      ${groups.length
        ? `<div class="notes-by-book">${groups.map(renderNoteGroup).join('')}</div>`
        : `<div class="empty"><div class="empty-title">尚無筆記</div><div class="empty-sub">點右上角＋開始記錄，或進入書本編輯閱讀內容</div></div>`}

    </div>
  `;

  const inp = document.getElementById('note-search-input');
  if (inp) {
    inp.addEventListener('input', e => {
      ui.noteSearch = e.target.value;
      render();
      // refocus search
      const x = document.getElementById('note-search-input');
      if (x) { x.focus(); const v = x.value; x.value = ''; x.value = v; }
    });
  }
}

        <div class="note-group-chevron">${I.chev}</div>
      </header>
      <div class="note-group-body">
        <div class="note-group-list">
          ${g.notes.map(n => renderNoteItem(n, b)).join('')}
        </div>

          <button class="note-group-action" onclick="event.stopPropagation();navigate('#/book/${b.id}')">前往書本 →</button>

function toggleNoteGroup(id) {
  if (ui.expandedNoteGroups.has(id)) ui.expandedNoteGroups.delete(id);
  else ui.expandedNoteGroups.add(id);
  // 局部更新而非整頁 re-render，保留卷軸
  const sec = document.querySelector(`.note-group[data-bid="${CSS.escape(id)}"]`);
  if (sec) sec.classList.toggle('is-expanded');
  updateGroupToggleBtnLabel();
}

function toggleAllNoteGroups() {
  // 取得目前 Notes 頁面所有可見群組的 book id
  const ids = Array.from(document.querySelectorAll('.note-group')).map(el => el.getAttribute('data-bid'));
  if (!ids.length) return;
  const anyCollapsed = ids.some(id => !ui.expandedNoteGroups.has(id));
  if (anyCollapsed) {
    // 全部展開
    ids.forEach(id => ui.expandedNoteGroups.add(id));
  } else {
    // 全部收合
    ids.forEach(id => ui.expandedNoteGroups.delete(id));
  }
  document.querySelectorAll('.note-group').forEach(el => {
    el.classList.toggle('is-expanded', ui.expandedNoteGroups.has(el.getAttribute('data-bid')));
  });
  updateGroupToggleBtnLabel();
}

function updateGroupToggleBtnLabel() {
  const btn = document.getElementById('groupToggleBtn');
  if (!btn) return;
  const ids = Array.from(document.querySelectorAll('.note-group')).map(el => el.getAttribute('data-bid'));
  const anyCollapsed = ids.some(id => !ui.expandedNoteGroups.has(id));
  btn.textContent = anyCollapsed ? '全部展開' : '全部收合';
}

function renderNoteItem(n, b) {
  const label = n._label || TYPE_LABEL[n.type] || n.type || '筆記';
  return `
    <div class="note-item">
      <div class="note-item-head">
        <span class="note-type ${TYPE_CLASS[n.type]||''}">${escapeHtml(label)}</span>
        ${n.date ? `<span class="note-date">${fmtDate(n.date)}</span>` : ''}
      </div>
      <div class="note-item-content">${escapeHtml(n.content)}</div>
      ${(n.tags||[]).length ? `<div class="note-item-tags">${(n.tags||[]).map(t => '<span class="tag">#' + escapeHtml(t) + '</span>').join('')}</div>` : ''}
    </div>
  `;
}

    title: '', isbn: '', publisher: '', year: '',
    author: '', translator: '', edition: '', price: '', binding: '',
    category: '', tags: [],
    status: 'want',
    summary: '', coreIdea: '', myThoughts: '', designLessons: '',
    authorBg: '', publishBg: '', appliedProjects: '',
    coverUrl: '',
    addedAt: new Date().toISOString().slice(0,10)
  };
}

// 推算下一個建議編號（依分類前綴 + 流水號）
function suggestNextBookId(prefix) {
  if (!prefix) return '';
  const re = new RegExp('^' + prefix + '(\\d+)');
  const nums = state.books
    .map(b => { const m = (b.id || '').match(re); return m ? parseInt(m[1], 10) : null; })
    .filter(n => n != null);
  const next = nums.length ? Math.max(...nums) + 1 : 1;
  return prefix + String(next).padStart(3, '0');
}

function renderForm(id, mode = 'basic') {
  // mode: 'basic' (新增 / 編輯基本資料) 或 'content' (編輯閱讀筆記/設計轉譯/背景脈絡)
  const isEdit = !!id;
  ui.formMode = mode;
  if (!ui.formDraft || ui.formDraft._editingId !== (id||'__new') || ui.formDraft._mode !== mode) {
    const base = id ? { ...bookById(id) } : emptyBook();
    base._editingId = id || '__new';
    base._mode = mode;
    ui.formDraft = base;
    ui.formTab = (mode === 'content') ? 'notes' : 'basic';
  }
  const d = ui.formDraft;

  const tabs = (mode === 'content')
    ? `<div class="form-tabs">
         <button class="form-tab ${ui.formTab==='notes' ? 'active' : ''}" onclick="setFormTab('notes')">閱讀筆記</button>
         <button class="form-tab ${ui.formTab==='design' ? 'active' : ''}" onclick="setFormTab('design')">設計轉譯</button>
         <button class="form-tab ${ui.formTab==='context' ? 'active' : ''}" onclick="setFormTab('context')">背景脈絡</button>
       </div>`
    : ''; // basic mode 沒有分頁

  const titleText = mode === 'content' ? '編輯閱讀內容' : (isEdit ? '編輯基本資料' : '新增書籍');

  main().innerHTML = `
    <header class="sub-header">
      <button class="icon-btn" onclick="cancelForm()" aria-label="返回">${I.back}</button>
      <div class="sub-header-title">${titleText}</div>
      <button class="icon-btn" style="visibility:hidden">${I.plus}</button>
    </header>

    <div class="content fade-in form-container">

      ${tabs}
      ${mode === 'basic' ? `<div class="label-divider">基本資料 / METADATA</div>` : ''}

      <div id="form-section">${renderFormSection()}</div>

    </div>

    <div class="btn-row form-container">
      <button class="btn btn-ghost" onclick="cancelForm()">取消</button>
      ${isEdit && mode === 'basic' ? `<button class="btn btn-danger" onclick="confirmDelete('${id}')">刪除</button>` : ''}
      <button class="btn btn-primary" onclick="saveForm()">${isEdit ? '儲存變更' : '新增藏書'}</button>
    </div>
    <div style="height:24px"></div>
  `;

  bindFormInputs();
}

function setFormTab(tab) {
  ui.formTab = tab;
  document.querySelectorAll('.form-tab').forEach(el => el.classList.remove('active'));
  const order = (ui.formMode === 'content')
    ? ['notes','design','context']
    : ['basic','notes','design','context'];
  document.querySelectorAll('.form-tab')[order.indexOf(tab)]?.classList.add('active');
  document.getElementById('form-section').innerHTML = renderFormSection();
  bindFormInputs();
}

            <div class="field-hint">編號規則：YH 人文史哲 / YP 心理學 / YR 文學 / YF 財經 / YD 設計 / YL 語言 / YW 繪畫</div>

        </div>

function bindFormInputs() {
  document.querySelectorAll('[data-k]').forEach(el => {
    el.addEventListener('input', e => {
      const k = e.target.dataset.k;
      let v = e.target.value;
      if (k === 'tags') {
        v = v.split(/[,，\s]+/).map(s => s.trim()).filter(Boolean);
      }
      ui.formDraft[k] = v;
    });
  });
}

function setDraftField(k, v) {
  ui.formDraft[k] = v;
  document.getElementById('form-section').innerHTML = renderFormSection();
  bindFormInputs();
}

function fillSuggestedId(prefix) {
  ui.formDraft.id = suggestNextBookId(prefix);
  // 順便把分類也帶上
  const catMap = { YH:'人文史哲', YP:'心理學', YR:'文學', YF:'財經', YD:'設計', YL:'語言', YW:'繪畫' };
  if (catMap[prefix] && !ui.formDraft.category) ui.formDraft.category = catMap[prefix];
  document.getElementById('form-section').innerHTML = renderFormSection();
  bindFormInputs();
}

function saveForm() {
  const d = ui.formDraft;
  const isEdit = d._editingId !== '__new';

  // 編號／書名 驗證
  if (!isEdit) {
    if (!d.id || !String(d.id).trim()) {
      alert('請輸入書本編號（例：YD081）');
      ui.formTab = 'basic';
      document.getElementById('form-section').innerHTML = renderFormSection();
      bindFormInputs();
      return;
    }
    d.id = String(d.id).trim();
    // 重複檢查
    if (state.books.some(b => b.id === d.id)) {
      alert('編號 ' + d.id + ' 已存在，請改用其他編號');
      ui.formTab = 'basic';
      document.getElementById('form-section').innerHTML = renderFormSection();
      bindFormInputs();
      return;
    }
  }

  if (!d.title || !d.title.trim()) {
    alert('請至少填寫書名');
    ui.formTab = 'basic';
    document.getElementById('form-section').innerHTML = renderFormSection();
    bindFormInputs();
    return;
  }

  const clean = { ...d };
  delete clean._editingId;
  delete clean._mode;
  if (typeof clean.tags === 'string') {
    clean.tags = clean.tags.split(/[,，\s]+/).map(s => s.trim()).filter(Boolean);
  }
  if (!clean.tags) clean.tags = [];
  if (isEdit) {
    state.books = state.books.map(b => b.id === clean.id ? clean : b);
  } else {
    state.books = [clean, ...state.books];
  }
  save();
  ui.formDraft = null;
  navigate('#/book/' + clean.id);
}

function cancelForm() {
  ui.formDraft = null;
  history.back();
}

/* ───────── Settings actions ───────── */
async function sendPasswordReset() {
  if (!window.fbCloud || !window.fbCloud.email) { alert('尚未登入'); return; }
  if (!confirm(`將寄密碼重設信到 ${window.fbCloud.email}？`)) return;
  try {
    if (window.fbCloud.sendPasswordReset) {
      await window.fbCloud.sendPasswordReset(window.fbCloud.email);
      alert('已寄出，請至信箱收信。');
    } else {
      alert('此版本尚未支援，請至 Firebase Console 重設。');
    }
  } catch(e) {
    alert('寄送失敗：' + (e.message || e));
  }
}

function goToLogin() {
  document.getElementById('authScreen')?.classList.remove('hidden');
  const root = document.getElementById('appRoot');
  if (root) root.style.display = 'none';
}

async function forceCloudPush() {
  if (!window.fbCloud || !window.fbCloud.uid) { alert('尚未登入雲端'); return; }
  if (!confirm('將以本機目前資料覆蓋雲端，確定？')) return;
  try {
    await window.fbCloud.saveCloud(state);
    alert('已推送至雲端');
  } catch(e) {
    alert('推送失敗：' + (e.message || e));
  }
}

async function requestNotifPerm() {
  if (typeof Notification === 'undefined') return;
  try {
    await Notification.requestPermission();
    render();
  } catch(e) { console.error(e); }
}

function exportJson() {
  const payload = {
    app: 'archive',
    version: APP_VERSION,
    exportedAt: new Date().toISOString(),
    books: state.books,
    notes: state.notes
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `archive-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportCsv() {
  const cols = ['id','title','author','translator','publisher','year','edition','price','isbn','binding','category','tags','status','summary','coreIdea','myThoughts','designLessons','authorBg','publishBg','appliedProjects','addedAt'];
  const csvEscape = v => {
    const s = (v == null ? '' : Array.isArray(v) ? v.join(';') : String(v));
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
  };
  const lines = [cols.join(',')];
  state.books.forEach(b => lines.push(cols.map(c => csvEscape(b[c])).join(',')));
  const blob = new Blob(['﻿' + lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `archive-books-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJsonFile(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.books) { alert('無效的備份檔（找不到 books 欄位）'); return; }
      const mode = confirm('要「合併」這份備份到現有資料嗎？\n\n按「確定」＝合併（同 id 用備份覆蓋）\n按「取消」＝完全取代現有資料');
      if (mode) {
        const map = new Map(state.books.map(b => [b.id, b]));
        data.books.forEach(b => map.set(b.id, b));
        state.books = Array.from(map.values());
        if (Array.isArray(data.notes)) {
          const nmap = new Map(state.notes.map(n => [n.id, n]));
          data.notes.forEach(n => nmap.set(n.id, n));
          state.notes = Array.from(nmap.values());
        }
      } else {
        if (!confirm('確定要完全取代？目前資料會消失。')) return;
        state.books = data.books;
        state.notes = data.notes || [];
      }
      save();
      alert(`匯入完成：${state.books.length} 本書，${state.notes.length} 則筆記`);
      render();
    } catch(err) {
      alert('解析失敗：' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function clearLocalCache() {
  if (!confirm('清除本機 localStorage？\n（雲端資料不受影響，下次登入會重新拉回）')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  alert('已清除本機快取，將重新載入');
  location.reload();
}

/* expose to global */
window.navigate = navigate;
window.render = render;
window.goLibraryFiltered = goLibraryFiltered;
window.goLibraryByCategory = goLibraryByCategory;
window.setStatusFilter = setStatusFilter;

window.setDetailTab = setDetailTab;

window.cancelForm = cancelForm;
window.confirmDelete = confirmDelete;
window.setNoteDraftField = setNoteDraftField;
window.saveNoteForm = saveNoteForm;
window.cancelNoteForm = cancelNoteForm;
window.sendPasswordReset = sendPasswordReset;
window.goToLogin = goToLogin;
window.forceCloudPush = forceCloudPush;
window.requestNotifPerm = requestNotifPerm;
window.exportJson = exportJson;
window.exportCsv = exportCsv;
window.importJsonFile = importJsonFile;
window.clearLocalCache = clearLocalCache;

/* ───────── Cloud sync hooks (called by firebase module) ───────── */
window.applyCloudState = function(data) {
  if (!data) return;
  if (Array.isArray(data.books)) state.books = data.books;
  if (Array.isArray(data.notes)) state.notes = data.notes;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
  // 重新繪製目前頁面，但保持卷軸位置
  const sy = window.scrollY;
  render();
  window.scrollTo({ top: sy });
};

window.pushLocalToCloud = async function() {
  if (window.fbCloud && window.fbCloud.uid && window.fbCloud.saveCloud) {
    try { await window.fbCloud.saveCloud(state); } catch(e) { console.warn('initial cloud push failed', e); }
  }
};

// 將原本的 save() 包一層，讓本地寫入後也推到雲端
const __origSave = save;
save = function() {
  __origSave();
  if (window.fbCloud && window.fbCloud.uid && window.fbCloud.saveCloud) {
    window.fbCloud.saveCloud(state).catch(err => {
      console.warn('cloud save failed:', err);
      const el = document.querySelector('.cloud-status');
      if (el) { el.classList.add('is-error'); el.textContent = 'SYNC ERROR'; }
    });
  }
};

// 登出
window.cloudLogout = async function() {
  if (!window.fbCloud || !window.fbCloud.signOut) return;
  if (!confirm('確定要登出？登出後其他裝置仍會保留你的資料。')) return;
  try { await window.fbCloud.signOut(); } catch(e) { console.error(e); }
};

</script>

<!-- ───────── Firebase 雲端同步模組 ───────── -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
import {
  getAuth, onAuthStateChanged,
  signInWithEmailAndPassword, createUserWithEmailAndPassword,
  signOut, setPersistence, browserLocalPersistence,
  sendPasswordResetEmail
} from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';
import {
  getFirestore, doc, setDoc, onSnapshot
} from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDkaBSxNLtidyBmVzsQmmpZyuWbreFGn0o",
  authDomain: "archive-d0eb1.firebaseapp.com",
  projectId: "archive-d0eb1",
  storageBucket: "archive-d0eb1.firebasestorage.app",
  messagingSenderId: "1057307058593",
  appId: "1:1057307058593:web:732d9f06db6005334cabe0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

try { await setPersistence(auth, browserLocalPersistence); } catch(e) { console.warn(e); }

window.fbCloud = {
  ready: true,
  uid: null,
  email: null,
  unsubscribe: null,
  signIn: (email, pw) => signInWithEmailAndPassword(auth, email, pw),
  signUp: (email, pw) => createUserWithEmailAndPassword(auth, email, pw),
  signOut: () => signOut(auth),
  sendPasswordReset: (email) => sendPasswordResetEmail(auth, email),
  saveCloud: async (state) => {
    if (!window.fbCloud.uid) return;
    const ref = doc(db, 'users', window.fbCloud.uid, 'library', 'data');
    await setDoc(ref, {
      books: state.books || [],
      notes: state.notes || [],
      updatedAt: new Date().toISOString()
    });
  }
};

const $ = id => document.getElementById(id);

function showApp() {
  $('authScreen')?.classList.add('hidden');
  const root = $('appRoot');
  if (root) root.style.display = '';
}
function showAuth() {
  $('authScreen')?.classList.remove('hidden');
  const root = $('appRoot');
  if (root) root.style.display = 'none';
}
function setAuthError(msg) { const el = $('authError'); if (el) el.textContent = msg || ''; }
function setLoading(loading) {
  $('btnSignIn').disabled = loading;
  $('btnSignUp').disabled = loading;
  $('btnSignIn').textContent = loading ? '處理中…' : '登入';
}

function translateAuthError(e) {
  const c = (e && e.code) || '';
  if (c.includes('invalid-email'))         return 'Email 格式錯誤';
  if (c.includes('user-not-found'))        return '找不到此帳號，請改用「註冊」';
  if (c.includes('wrong-password'))        return '密碼錯誤';
  if (c.includes('invalid-credential'))    return '帳號或密碼錯誤';
  if (c.includes('email-already-in-use'))  return '此 Email 已註冊，請改用「登入」';
  if (c.includes('weak-password'))         return '密碼至少 6 個字元';
  if (c.includes('network'))               return '網路連線失敗，請稍後再試';
  if (c.includes('too-many-requests'))     return '嘗試次數過多，請稍候再試';
  return (e && e.message) || '操作失敗';
}

async function handleSignIn() {
  const email = $('authEmail').value.trim();
  const pw    = $('authPassword').value;
  if (!email || !pw) { setAuthError('請填入 Email 與密碼'); return; }
  setAuthError(''); setLoading(true);
  try { await window.fbCloud.signIn(email, pw); }
  catch(e) { setAuthError(translateAuthError(e)); }
  finally { setLoading(false); }
}
async function handleSignUp() {
  const email = $('authEmail').value.trim();
  const pw    = $('authPassword').value;
  if (!email || !pw) { setAuthError('請填入 Email 與密碼'); return; }
  if (pw.length < 6) { setAuthError('密碼至少 6 個字元'); return; }
  setAuthError(''); setLoading(true);
  try { await window.fbCloud.signUp(email, pw); }
  catch(e) { setAuthError(translateAuthError(e)); }
  finally { setLoading(false); }
}

// 綁定登入畫面按鈕
$('btnSignIn').addEventListener('click', handleSignIn);
$('btnSignUp').addEventListener('click', handleSignUp);
$('authPassword').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSignIn(); });
$('authSkip').addEventListener('click', (e) => {
  e.preventDefault();
  showApp();
  if (window.render) window.render();
});

// 監聽登入狀態
onAuthStateChanged(auth, async (user) => {
  if (user) {
    window.fbCloud.uid = user.uid;
    window.fbCloud.email = user.email;
    showApp();

    // 訂閱使用者書庫文件，雲端為真實來源
    if (window.fbCloud.unsubscribe) window.fbCloud.unsubscribe();
    const ref = doc(db, 'users', user.uid, 'library', 'data');
    let firstSnap = true;
    window.fbCloud.unsubscribe = onSnapshot(ref, async (snap) => {
      if (snap.exists()) {
        const data = snap.data();
        if (window.applyCloudState) window.applyCloudState(data);
      } else if (firstSnap) {
        // 雲端尚未有資料 → 把本機目前狀態（含 SEED）一次寫上去
        if (window.pushLocalToCloud) await window.pushLocalToCloud();
        if (window.render) window.render();
      }
      firstSnap = false;
    }, (err) => {
      console.error('Firestore 監聽錯誤:', err);
      const el = document.querySelector('.cloud-status');
      if (el) { el.classList.add('is-error'); el.textContent = 'SYNC ERROR'; }
    });
  } else {
    window.fbCloud.uid = null;
    window.fbCloud.email = null;
    if (window.fbCloud.unsubscribe) { window.fbCloud.unsubscribe(); window.fbCloud.unsubscribe = null; }
    showAuth();
  }
});
</script>
